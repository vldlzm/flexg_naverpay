<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문상태값 매핑 - 네이버페이</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size: 13px; color: #333; background: #fff; }
  a { color: #03c75a; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* 3열 레이아웃 */
  .layout-wrap { display: flex; max-width: 1600px; margin: 0 auto; min-height: 100vh; }
  .sidebar-left { width: 140px; min-width: 140px; border-right: 1px solid #e0e0e0; padding: 24px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; background: #fafafa; flex-shrink: 0; }
  .sidebar-right { display: none; width: 240px; min-width: 240px; border-left: 1px solid #e0e0e0; padding: 24px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; background: #fafafa; flex-shrink: 0; }
  .page-wrap { flex: 1; padding: 30px 20px 60px; overflow-y: auto; min-width: 0; }

  /* 인덱스 */
  .index-label { font-size: 11px; font-weight: bold; color: #aaa; padding: 0 16px 10px; letter-spacing: 0.5px; text-transform: uppercase; }
  .index-item { display: block; padding: 7px 16px; font-size: 13px; color: #555; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; text-decoration: none; }
  .index-item:hover { color: #03c75a; background: #f0faf5; text-decoration: none; }
  .index-item.active { color: #03c75a; font-weight: bold; border-left-color: #03c75a; background: #f0faf5; }

  /* 화면설명 패널 */
  .panel-label { font-size: 11px; font-weight: bold; color: #aaa; padding: 0 16px 10px; letter-spacing: 0.5px; text-transform: uppercase; }
  #screen-desc { display: none; padding: 0 16px; }
  #screen-desc.visible { display: block; }
  #screen-desc .desc-name { font-size: 13px; font-weight: bold; color: #03c75a; margin-bottom: 8px; }
  #screen-desc .desc-text { font-size: 12px; color: #666; line-height: 1.8; }

  /* 페이지 타이틀 */
  .page-title { font-size: 20px; font-weight: bold; color: #222; padding-bottom: 14px; border-bottom: 1px solid #ddd; margin-bottom: 24px; }

  /* 매핑 테이블 */
  .mapping-table { width: 100%; border-collapse: collapse; }
  .mapping-table th { text-align: left; padding: 14px 20px; font-size: 14px; font-weight: bold; color: #222; border-bottom: 1px solid #ddd; }
  .mapping-table td { padding: 14px 20px; font-size: 13px; color: #333; }
  .mapping-table tr:nth-child(even) td { background: #f7f7f7; }
  .mapping-table tr:not(:last-child) td { border-bottom: 1px solid #eee; }
</style>
</head>
<body>
<div class="layout-wrap">

  <!-- 좌측 인덱스 -->
  <aside class="sidebar-left">
    <div class="index-label">Index</div>
    <nav>
      <a class="index-item" onclick="location.href='index.html'">주문형 네이버페이란?</a>
      <a class="index-item" onclick="location.href='product_edit.html'">상품등록/수정</a>
      <a class="index-item" onclick="location.href='confirm.html'">확인사항</a>
      <a class="index-item" onclick="location.href='search_condition.html'">검색 조건</a>
      <a class="index-item" onclick="location.href='order_detail.html'">주문 상세정보</a>
      <a class="index-item active">주문상태값 매핑</a>
      <a class="index-item" onclick="location.href='exchange_management.html'">교환관리</a>
    </nav>
  </aside>

  <!-- 중앙 메인 -->
  <div class="page-wrap">

    <div class="page-title">네이버페이</div>

    <table class="mapping-table">
      <tr>
        <th>플렉스지</th>
        <th>네이버페이 주문형</th>
      </tr>
      <tr>
        <td>미입금확인</td>
        <td>결제대기중</td>
      </tr>
      <tr>
        <td>신규주문</td>
        <td>신규주문</td>
      </tr>
      <tr>
        <td>수락대기</td>
        <td>-</td>
      </tr>
      <tr>
        <td>배송준비</td>
        <td>배송준비중</td>
      </tr>
      <tr>
        <td>부분배송중</td>
        <td>-</td>
      </tr>
      <tr>
        <td>배송중</td>
        <td>배송중</td>
      </tr>
      <tr>
        <td>배송완료</td>
        <td>배송완료 → 구매확정</td>
      </tr>
      <tr>
        <td>배송예약</td>
        <td>-</td>
      </tr>
      <tr>
        <td>주문자요청 배송전</td>
        <td>취소요청(배송전)</td>
      </tr>
      <tr>
        <td>주문자요청 배송후</td>
        <td>취소요청(배송후)</td>
      </tr>
      <tr>
        <td>주문취소</td>
        <td>취소완료</td>
      </tr>
      <tr>
        <td>반품관리</td>
        <td>반품처리중/반품완료</td>
      </tr>
      <tr>
        <td>교환관리</td>
        <td>교환처리중/교환완료</td>
      </tr>
      <tr>
        <td>휴지통</td>
        <td>-</td>
      </tr>
      <tr>
        <td>주문대기</td>
        <td>-</td>
      </tr>
    </table>

  </div><!-- /page-wrap -->

  <!-- 우측 화면설명 -->
  <aside class="sidebar-right">
    <div class="panel-label">화면설명</div>
    <div id="screen-desc">
      <div class="desc-name" id="desc-name"></div>
      <div class="desc-text" id="desc-text"></div>
    </div>
  </aside>

</div><!-- /layout-wrap -->
</body>
</html>
